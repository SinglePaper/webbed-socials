    <hr style="margin-top:0;padding-top:0">

    <!-- Add Feed pop-up -->
    <div class="modal fade" id="addFeedModal" tabindex="-1" aria-labelledby="addFeedModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
          <div class="modal-header">
              <h1 class="modal-title fs-5" id="addFeedModalLabel">Add New Feed</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="addFeedModalBody" class="modal-body">
              ...
          </div>
          <div class="modal-footer">
              <button type="button" class="btn btn-danger">Cancel</button>
              <button type="button" class="btn btn-primary">Add</button>
          </div>
          </div>
      </div>
    </div>

    <!-- Edit Feed pop-up -->
    <div class="modal fade" id="editFeedModal" tabindex="-1" aria-labelledby="editFeedModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">

          <div class="modal-header">
              <h1 class="modal-title fs-5" id="editFeedModalLabel">Edit Feed</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="editFeedModalBody" class="modal-body">
              ...
          </div>
          <div class="modal-footer">
              <button type="button" data-bs-dismiss="modal" onclick="deleteFeed(document.getElementById('editFeedModal').getAttribute('label'))" class="btn btn-danger">Delete</button>
              <button type="button" data-bs-dismiss="modal" class="btn btn-primary">Save</button>
          </div>
          </div>
      </div>
    </div>

    <!-- Add Folder pop-up -->
    <div class="modal fade" id="addFolderModal" tabindex="-1" aria-labelledby="addFolderModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
          <div class="modal-header">
              <h1 class="modal-title fs-5" id="addFolderModalLabel">Add New Folder</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="addFolderModalBody" class="modal-body">
              ...
          </div>
          <div class="modal-footer">
              <button type="button" data-bs-dismiss="modal" class="btn btn-danger">Cancel</button>
              <button type="button" data-bs-dismiss="modal" class="btn btn-primary">Add</button>
          </div>
          </div>
      </div>
    </div>

    <!-- Edit Folder pop-up -->
    <div class="modal fade" id="editFolderModal" tabindex="-1" aria-labelledby="editFolderModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
          <div class="modal-header">
              <h1 class="modal-title fs-5" id="editFolderModalLabel">Edit Folder</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="editFolderModalBody" class="modal-body">
              ...
          </div>
          <div class="modal-footer">
              <button type="button" data-bs-dismiss="modal" onclick="deleteFolder(document.getElementById('editFolderModal').getAttribute('label'))" class="btn btn-danger">Delete</button>
              <button type="button" data-bs-dismiss="modal" class="btn btn-primary">Save</button>
          </div>
          </div>
      </div>
    </div>

    <!-- Settings pop-up -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
          <div class="modal-header border-0">
              <h1 class="modal-title fs-5" id="settingsModalLabel">Settings</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="settingsModalBody" class="modal-body">
              ...
          </div>
          <div class="modal-footer border-0">
              <button type="button" class="btn btn-danger">Delete</button>
              <button type="button" class="btn btn-primary">Save</button>
          </div>
          </div>
      </div>
    </div>

    <!-- home.html iframe -->
    <div style="height:94%">
        <iframe id="frame" src="html/home.html"  allowtransparency="true" style="background-color:transparent; height:100%; width:100%; color-scheme: auto"></iframe>
    </div>
  </body>
  <footer>
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/set_color_mode.js"></script>
    <script src="../js/feeds_list.js"></script>
    <script src="../js/opml.js"></script>
    <script>
      const frame = document.getElementById('frame');
      const colorModeBtn = document.getElementById("colorModeBtn")
      let curColorMode = document.documentElement.getAttribute("data-bs-theme")
      colorModeBtn.innerHTML = localStorage.getItem("colorMode") == "dark"?darkModeIcon:lightModeIcon

      frame.addEventListener('load', () => {
        frame.contentWindow.postMessage({ type: 'set-theme', theme: document.documentElement.getAttribute("data-bs-theme") }, '*');
      });

      function toggleColorMode() {
        curColorMode = document.documentElement.getAttribute("data-bs-theme")
        localStorage.setItem("colorMode", curColorMode == "dark" ? null : "dark")
        document.documentElement.setAttribute("data-bs-theme", localStorage.getItem("colorMode"))
        frame.contentWindow.postMessage({ type: 'set-theme', theme: localStorage.getItem("colorMode") }, '*');
        colorModeBtn.innerHTML = localStorage.getItem("colorMode") == "dark"?darkModeIcon:lightModeIcon
      }
    </script>
  </footer>
</html>
